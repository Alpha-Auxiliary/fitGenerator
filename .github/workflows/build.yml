name: Build and Release EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        shell: pwsh
        run: |
          npm run build

      - name: Verify build
        shell: pwsh
        run: |
          if (Test-Path dist/fit-tool.exe) {
            Write-Host "Success: fit-tool.exe found!"
          } else {
            Write-Error "Error: fit-tool.exe NOT found in dist/ directory"
            exit -1
          }

      - name: Create or Update Release
        # 只要是 push 到主分支或推标签，都进行发布
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # 使用 latest 作为通用标签，或使用具体的 v* 标签
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Latest Stable Build' }}
          body: |
            ### 🚀 自动构建发布
            这是本项目的最新稳定生成版本。
            - **分支**: ${{ github.ref_name }}
            - **提交**: ${{ github.sha }}
            - **备注**: 下载下方的 `fit-tool.exe` 即可直接使用。
          files: dist/fit-tool.exe
          prerelease: false # 【关键修改：设为正式发布】
          make_latest: true # 设为最新版本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
