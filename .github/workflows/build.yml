name: Build and Release EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        # 显式使用 powershell 确保逻辑一致
        shell: pwsh
        run: |
          npm run build

      - name: Verify build
        shell: pwsh
        run: |
          if (Test-Path dist/fit-tool.exe) {
            Write-Host "Success: fit-tool.exe found!"
          } else {
            Write-Error "Error: fit-tool.exe NOT found in dist/ directory"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fit-tool-exe
          path: dist/fit-tool.exe
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fit-tool.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
