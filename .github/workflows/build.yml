name: Build and Release EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build EXE
        shell: pwsh
        run: |
          npm run build

      - name: Verify build
        shell: pwsh
        run: |
          if (Test-Path dist/fit-tool.exe) {
            Write-Host "Success: fit-tool.exe found!"
          } else {
            Write-Error "Error: fit-tool.exe NOT found in dist/ directory"
            exit -1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fit-tool-exe
          path: dist/fit-tool.exe
          if-no-files-found: error

      # 逻辑 1：针对普通的 push 分支，更新一个固定的 Latest Release
      - name: Update Latest Development Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Development Build (Auto-generated)"
          body: "This release contains the most recent build from the development branch."
          files: dist/fit-tool.exe
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 逻辑 2：针对打标签的版本号 (如 v1.0.1)，创建一个独立的正式 Release
      - name: Create Versioned Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fit-tool.exe
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
